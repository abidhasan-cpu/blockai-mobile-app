steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # Step 2: Export for web (since you are deploying to Cloud Run)
  - name: 'node:20'
    entrypoint: npx
    args: ['expo', 'export', '--platform', 'web']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west2-docker.pkg.dev/$PROJECT_ID/blockai-production/app:$COMMIT_SHA', '-f', 'Dockerfile', '.']

  # Step 4: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west2-docker.pkg.dev/$PROJECT_ID/blockai-production/app:$COMMIT_SHA']

options:
  logging: CLOUD_LOGGING_ONLY
