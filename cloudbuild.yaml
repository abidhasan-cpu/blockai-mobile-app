steps:
  # step 0: Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # step 1: Build for Web (যেহেতু Cloud Run এ ডিপ্লয় হচ্ছে)
  - name: 'node:20'
    entrypoint: npx
    args: ['expo', 'export', '--platform', 'web']

  # step 2: Dockerize and Push (আপনার আগের স্ক্রিনশট অনুযায়ী যা ছিল)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west2-docker.pkg.dev/$PROJECT_ID/blockai-production/app:$COMMIT_SHA', '.']

images:
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/blockai-production/app:$COMMIT_SHA'
